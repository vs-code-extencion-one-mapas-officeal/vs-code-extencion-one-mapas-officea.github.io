<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IA Code Assistant - Server Link</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1e1e1e;
            color: #d4d4d4;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #252526;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            text-align: center;
            max-width: 500px;
            width: 100%;
        }
        h1 { color: #007acc; margin-bottom: 10px; }
        p { color: #858585; }
        .status {
            margin-top: 20px;
            padding: 10px;
            background-color: #2d2d2d;
            border-left: 4px solid #4ec9b0;
            font-family: monospace;
            text-align: left;
            word-break: break-all;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>One Mapas Officeal IA</h1>
        <p>Este site atua como o servidor de respostas para a sua extensão do VS Code.</p>
        
        <div class="status">
            <strong>Status do Servidor:</strong> <span style="color: #4ec9b0;">Online</span><br>
            <strong>Última Requisição:</strong> <span id="req-log">Nenhuma requisição recebida ainda.</span>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
